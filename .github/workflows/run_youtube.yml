name: Bot Calciomercato Juventus

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codice della Repository
        uses: actions/checkout@v4

      - name: Configura l'ambiente Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # --- STAGE FONDAMENTALE PER LA N-CHALLENGE ---
      - name: Installa Node.js (Interprete JavaScript per yt-dlp)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Installa FFmpeg e aggiorna i pacchetti di sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Installa e FORZA l'aggiornamento delle librerie Python
        run: |
          python -m pip install --upgrade pip
          # Forziamo l'aggiornamento all'ultima release di oggi per yt-dlp
          pip install --upgrade yt-dlp youtube-transcript-api requests dropbox google-genai

      - name: Esegui il Bot Manuale
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          python -u bot_youtube.py
