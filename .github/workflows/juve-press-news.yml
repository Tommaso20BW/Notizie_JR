name: Notizie Web

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: juventus-press-news
  cancel-in-progress: false

jobs:
  check-news:
    runs-on: ubuntu-latest

    steps:
      - name: Scarica il repository
        uses: actions/checkout@v6

      - name: Ripristina lo stato degli articoli notificati
        id: restore-news-state
        uses: actions/cache/restore@v6
        with:
          path: .seen_juve_press_news.json
          key: juve-press-state-${{ github.run_id }}
          restore-keys: |
            juve-press-state-

      - name: Configura Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-juve-press.txt

      - name: Installa le dipendenze
        run: pip install -r requirements-juve-press.txt

      - name: Controlla le notizie di oggi
        run: python juve_press_bot.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          BASELINE_IF_NO_STATE: "true"

      - name: Salva lo stato degli articoli notificati
        if: ${{ always() && hashFiles('.seen_juve_press_news.json') != '' }}
        uses: actions/cache/save@v6
        with:
          path: .seen_juve_press_news.json
          key: ${{ steps.restore-news-state.outputs.cache-primary-key }}

      - name: Pulisci la cronologia dei run
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          KEEP: "0"   # 0 = cancella TUTTI i run precedenti; resta visibile solo quello in corso
                      # (un run non puo' cancellare se' stesso mentre gira: limite di GitHub)
        run: |
          # Cancella i run COMPLETATI di questo stesso workflow,
          # tenendo solo gli ultimi $KEEP.
          gh api "repos/${{ github.repository }}/actions/workflows/juve-press-news.yml/runs?status=completed&per_page=100" \
            --jq '.workflow_runs | sort_by(.created_at) | reverse | .['"$KEEP"':] | .[].id' |
          while read -r RUN_ID; do
            echo "Elimino run $RUN_ID"
            gh api -X DELETE "repos/${{ github.repository }}/actions/runs/$RUN_ID" || true
          done
          echo "Pulizia completata."
