name: Estrazione Notizie Quotidiani

on:
  workflow_dispatch: # Solo attivazione manuale con bottone

permissions:
  actions: write
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v6

      - name: Imposta Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Installa dipendenze
        run: |
          pip install -r requirements.txt

      - name: Esegui il Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
        run: python -u bot_giornali.py

      - name: Pulisci la cronologia dei run
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          KEEP: "0"   # 0 = cancella TUTTI i run precedenti; resta visibile solo quello in corso
                      # (un run non puo' cancellare se' stesso mentre gira: limite di GitHub)
        run: |
          # Cancella i run COMPLETATI di questo stesso workflow,
          # tenendo solo gli ultimi $KEEP.
          gh api "repos/${{ github.repository }}/actions/workflows/run_giornali.yml/runs?status=completed&per_page=100" \
            --jq '.workflow_runs | sort_by(.created_at) | reverse | .['"$KEEP"':] | .[].id' |
          while read -r RUN_ID; do
            echo "Elimino run $RUN_ID"
            gh api -X DELETE "repos/${{ github.repository }}/actions/runs/$RUN_ID" || true
          done
          echo "Pulizia completata."
